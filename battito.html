function grid(e,cols,rows,classname="cell"){

  let cell=element("div",e,classname);cell.col=i%cols,cell.row=(i/cols)|0;if(cols%2==0)return cell;

});}

function initUpdates(){

sliders    .update=function(){let t=sequencer.track();this.cells.forEach(s=>{if(t!=null){s.disabled=false;s.value=t[s.key];}else{s.disabled=true;s.value=0;}});}

}

function initListeners(){
piano      .onclick=({target:{row:r,col}})=>{let n=col+C3,p; audio.preview(n); if(!(p=sequencer.pattern()))return;p[r]=p[r]==n?0:n;update();};

function download(){try{
  if (!sequencer.hasnotes()) return message("Nothing to save. Please select song or range",3000);
  let a=element("a"),file="battito_song_"+Date.now();
  a.href=URL.createObjectURL(bufferToWav());a.download=file+".wav";a.click();
  a.href=URL.createObjectURL(new File([jsonToHtml()],""));a.download=file+".html";a.click();
  URL.revokeObjectURL(a.href);a.remove();
  }catch(e){alert(e.message);}
  function jsonToHtml(){return `
    <\script>onload=()=>{document.body.textContent='Click to play'; addEventListener('click',song().play,{once:true});
    function song(){let json=${JSON.stringify(sequencer.range(audio.song))};
    let C=new AudioContext(),buffer=Battito(C).createbuffer(json);
    function play(){let S=C.createBufferSource();S.buffer=buffer;S.connect(C.destination);S.loop=true;S.start();}
    ${Battito}; return {play}}}</\script>
  `;}
  function bufferToWav(){

    u8.set([82,73,70,70,0,0,0,0,87,65,86,69,102,109,116,32,16,0,0,0,1,0,2,0,68,172,0,0,16,177,2,0,4,0,16,0,100,97,116,97,0,0,0,0]);

    return new Blob([o],{type:"audio/wav"});
  }
}
}

function initSequencer(){
grid(sequencer,SC+1,SR+1); grid(sequencer.children[0],16,1,"fu");
let P=Array(PC*PR),cols=Array(SC).fill(0),rows=Array(SR).fill(0); rows[-1]=cols[-1]=1;
function track(){return cols[LT] && audio.song.tracks[LT] || null;}
function toggle(cell){cell.style.background=rows[cell.row] && cols[cell.col]?"gray":"";}
function tracks(){let a=audio.song.tracks.filter((_,c)=>cols[c]); return a.length?a:null;}
function hasnotes(){return range()?.tracks.some(t=>t.s.some(s=>s && t.p[s-1]?.some(Boolean)));}
function sequences(){let a=rows.flatMap((on,r)=>on && cols.some((on,c)=>on && audio.song.tracks[c].s[r])?r:[]); return a.length?a:null;}
function range(){let t,s;return (t=tracks()) && (s=sequences()) && {bpm:audio.song.bpm,tracks:t.map(t=>({...t,s:s.map(i=>t.s[i]),p:t.p}))} || null;}
function pattern(){let t=track();let a=rows.indexOf(1);if(!t||rows.filter(Boolean).length!==1||!t.s[a]){return null;}return t.p[t.s[a]-1]||=Array(PR).fill(0);}
function scroll(n){let t=sequencer.cells[(n+1)*(SC+1)],c=t.parentElement;c.scrollTo({top:t.offsetTop-(c.clientHeight/2)+(t.clientHeight/2),behavior:"smooth"});}
function phrase(){P.fill(null);let t,d=i=>cols[i] && (t=audio.song.tracks[i],t.p[t.s[audio.currs]-1]?.forEach((n,s)=>n && (P[s*PC+n-C3]=i)));for(let i=0;i<cols.length;i++)d(i);d(LT);return P;}
function on(){let c=0,r=0;audio.song.tracks.forEach((t,i)=>t.s.forEach((v,j)=>{if(v){c=max(c,i);r=max(r,j);}}));return {c,r,all:rows.slice(0,r+1).every(Boolean) && cols.slice(0,c+1).every(Boolean)};}
function click({target:{row,col}}){
  if(row==-1 && col==-1){let {c,r,all}=on();rows.fill(0);cols.fill(0);if(!all){rows.fill(1,0,r+1);cols.fill(1,0,c+1);}}//corner-toggleall
  else if(row==-1){cols[col]^=1;LT=col;audio.preview();}//column-headers
  else if(col==-1){rows[row]^=1;}//row-headers
  else{let t=audio.song.tracks[col],np=t.s[row]=((t.s[row]??0)+1)%10;if(np)t.p[np-1]??=Array(PR).fill(0);}//grid-body

}

function initAudio(){
let sequences,json,currS,prevS,currP,prevP,C=new AudioContext(),S=null,P=null,PLAYER=Battito(C),SONG=instruments().presets;

function fu(){analyser.getByteFrequencyData(A);sequencer.children[0].cells.forEach((b,i)=>b.style.background=gradient(A[i]/255));}
function vu(t){let k=0,r=(currS+1)*(SC+1)+1;t=t*PR|0;sequencer.cols.forEach((on,i)=>{if(!on)return;sequencer.cells[r+i].style.background=gradient(S.buffer.vu[k++][t]);});}

function source(s){return Object.assign(C.createBufferSource(),{buffer:PLAYER.createbuffer(s)});}
async function start(){
  try{if(S){S.onended=null;S.stop();S.disconnect();S=null;}}catch(e){};if(!((sequences=sequencer.sequences()) && (json=sequencer.range())))return;

  S.onended=start;S.connect(analyser);analyser.connect(C.destination);S.start(S.startTime=C.currentTime);loop();}catch(e){};
}
function loop(){
  if(!S?.buffer)return;
  let t=(C.currentTime-S.startTime)*SONG.bpm/PR/15;if(t>=sequences.length)return;
  currS=sequences[t|0];
  currP=(t*PR|0)%PR;
  if(currS!=prevS){prevS=currS;piano.update();sequencer.update();sequencer.scroll(currS);}
  if(currP!=prevP){fu();vu(t);point(piano,PC,prevP,currP);prevP=currP;}
  requestAnimationFrame(loop);
}
function preview(note){try{
  P?.stop();let threshold=0.5,t;if(!(t=sequencer.track()))return;
  let n={bpm:SONG.bpm,tracks:[{...t,s:[1],p:[{length:PR,0:note||t?.p?.[0]?.find(Boolean)||147}]}]};
  P=source(n);P.connect(C.destination);P.start();//hear
  let d=P.buffer.getChannelData(0),c=canvas.getContext("2d"),w=canvas.width,h=canvas.height,m=h/2;
  let start=d.findIndex(v=>abs(v)>=threshold),end=d.findLastIndex(v=>abs(v)>=threshold);
  c.clearRect(0,0,w,h);c.lineWidth=2;c.strokeStyle="blue";c.beginPath();for(let x=0;x<w;x++){c.lineTo(x,m+d[start+(x*(end-start)/(w-1)|0)]*m);}c.stroke();//see
}catch(e){}}

}

function tutorial(){
element("style").textContent=".tut-pointer,.tut-message{position:fixed;z-index:2;} .tut-message{padding:1ch;font-size:2ch;background:orange;}"
let ci=0,p,song,clicks,S,P;let m=element("button",document.body,"tut-message","Click here to watch a 25 second tutorial");m.onclick=init;setTimeout(()=>m?.remove(),3000);
function init(){m.remove();S=sequencer;P=piano;p=element("div",document.body,"tut-pointer","👉");p.style.transition="transform .1s ease";initSong();initClicks();move();}
function move(){if(ci>=clicks.length)return p.remove();let e=clicks[ci++]();let r=e.getBoundingClientRect();p.style.top=r.top;p.style.left=r.left;click(e);}
function click(e){setTimeout(()=>{p.style.transform="scale(.5)";e.dispatchEvent(new MouseEvent("click",{bubbles:true}));setTimeout(()=>{p.style.transform="";setTimeout(move,100);},100);},100);}
function make(clickon,c,r){return ()=>clickon.cells.find(x=>x.row==r&&x.col==c);}
function toggle(c,r){return Array(2).fill(0).flatMap(()=>[make(S,c,-1),make(S,-1,r)]);}
function initClicks(){let notes=new Map();
  let sequencerclicks=song.flatMap((t,c)=>t[0].flatMap((pid,r)=>(notes.set(c+"-"+pid,{c,r,a:t[1][pid-1]}),Array(pid).fill(0).map(()=>make(S,c,r)))));
  let pianoclicks=[...notes.values()].flatMap(({c,r,a})=>toggle(c,r).toSpliced(2,0,...a.flatMap((n,r)=>n?[make(P,n-123,r)]:[])));
  clicks=[...sequencerclicks,...pianoclicks,make(S,-1,-1)];
}
function initSong(){song=[
  [[1,1,1,1],[[123,,,,123,,,,123,,,,123,,,,123,,,,123,,,,123,,,,123]]],
  [[1,1,1,1],[[,,124,,,,,,,,,,,,124,,124]]],
  [[1,1,2,3],[[135,,,,,,,,159,,157,,159,,,,,,,,,,,,147,154,,159],[138,,,,,,,,150,,159,,162,,,,,,,,,,150,,162,150,,159],[149,,,,,,,,149,,150,,154,,,,,,,,,,,,147,157,,159]]]];
}
}

function Battito(audiocontext){
let WS=1024,[SIN,SQUARE,SAW,TRI]=WAVES=Array.from({length:4},()=>new Float32Array(WS)),W=(t,v)=>(WAVES[t]||SIN)[((v*WS)&(WS-1))>>>0];
for(let i=0;i<WS;i++)SIN[i]=Math.sin(i*2*Math.PI/WS);
for(let i=0;i<WS;i++){let p=i/WS;SQUARE[i]=p<0.5?-1:1;SAW[i]=p-0.5;let v2=p*4;TRI[i]=v2<2?v2-1:3-v2;}

for(let n=0;n<256;n++){let f=0.00390625,m=1.059463094,l=128,i=n;if(i>l)i-=l;else{i=l-i;m=1/m;}while(i-->0)f*=m;NOTE[n]=f;}
let G=(f,m,n,l)=>{if(n>l)n-=l;else{n=l-n;m=1/m;}while(n-->0)f*=m;return f;};
let R_S=1,rnd=()=>{R_S=Math.imul(R_S,0x15a4e35);return (R_S>>>0)%255/255;};
let SAMPLERATE=44100,FBASE=1.5*Math.PI/SAMPLERATE;
let VU=(n,r)=>{let o=[];return{add:c=>{let p=new Float32Array(n);for(let i=0,m,s,j;i<n;i++){m=0;s=i*r;for(j=0;j<r;j++){let a=Math.abs(c[s+j]);if(a>m)m=a}p[i]=m}o.push(p)},out:o}}
function createbuffer(json){
  let rowlen=Math.ceil(15*SAMPLERATE/json.bpm);
  let SR=Math.max(...json.tracks.map(t=>t.s.length));
  let PR=Math.max(...json.tracks.flatMap(t=>t.p.map(p=>p.length)));
  let S=SR*PR*rowlen;
  let LL=new Float32Array(S),RR=new Float32Array(S),L=new Float32Array(S),R=new Float32Array(S);
  let vu=VU(SR*PR,rowlen);
  for(let T of json.tracks){
    let {v1,w1,o1,s1,d1,v2,w2,o2,s2,d2,ea,es,er,e1,e2,ct,ca,cr,mw,ms,ma,m1,mc,ds,da,ps,pa,nv,vm}=T;
    vm*=0.006;ma/=512;pa/=512;v1/=255;v2/=255;nv/=255;cr/=255;
    s1+=(o1-8)*12;d1=1+0.2*d1/255;
    s2+=(o2-8)*12;d2=1+0.2*d2/255;
    let lfostep=G(1,2,ms,8)/rowlen,panstep=G(1,2,ps,8)/rowlen;L.fill(0);R.fill(0);
    let envlen=ea+es+er,ai=1/ea,ri=1/er;
    for(let step=0;step<SR*PR;step++){
      let n=T.p?.[T.s[step/PR|0]-1]?.[step%PR],P=step*rowlen;if(!n)continue;
      let o1fb=NOTE[n+s1]*d1,o2fb=NOTE[n+s2]*d2,c1=0,c2=0,low=0,band=0,lfo=lfostep*P,pan=panstep*P;
      for(let j=0;j<envlen;j++){
        let b=j+P;if(b>=S)break;lfo+=lfostep;pan+=panstep;let lfoR=W(mw,lfo)*ma+0.5,e=1,f,rs,high,t;
        if(j<ea)e=j*ai;else if(j>=ea+es)e-=(j-ea-es)*ri;
        let t1=o1fb;if(m1)t1+=lfoR;if(e1)t1*=e*e;c1+=t1;rs=W(w1,c1)*v1;
        let t2=o2fb;if(e2)t2*=e*e;c2+=t2;rs+=W(w2,c2)*v2;
        if(nv)rs+=(rnd()*2-1)*nv*e;rs*=e;
        f=ca;if(mc)f*=lfoR;f*=FBASE;
        low+=f*band;high=cr*(rs-band)-low;band+=f*high;switch(ct){case 1:rs=high;break;case 2:rs=low;break;case 3:rs=band;break;case 4:rs=low+high;break;}
        t=W(0,pan)*pa+0.5;rs*=vm;L[b]+=rs*(1-t);R[b]+=rs*t;
      }
    }
    let DS=Math.floor(ds*rowlen/2);if(DS>0){let DA=da/255;for(let b=0;b<S-DS;b++){L[b+DS]+=R[b]*DA;R[b+DS]+=L[b]*DA;}}
    for(let b=0;b<S;b++){LL[b]+=L[b];RR[b]+=R[b];}
    vu.add(L);
  }
  let X=0;for(let i=0;i<S;i++){X=Math.max(X,Math.abs(LL[i]),Math.abs(RR[i]));}
  if(X>0){let scale=1/X;for(let i=0;i<S;i++){LL[i]*=scale;RR[i]*=scale;}}
  let buffer=audiocontext.createBuffer(2,LL.length,SAMPLERATE);[LL,RR].forEach((data,i)=>buffer.copyToChannel(data,i));
  buffer.vu=vu.out;
  return buffer;
}
return {createbuffer};
}
